<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nạp Tiền Hệ Thống</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .nap-container {
            border: 2px solid #00ff7f;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 255, 127, 0.3);
            width: 100%;
            max-width: 450px;
            text-align: center;
            background-color: #050505;
        }
        h2 {
            color: #00ff7f;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        .user-info-brief {
            font-size: 14px;
            color: #888;
            margin-bottom: 20px;
            background: #111;
            padding: 8px;
            border-radius: 5px;
            border: 1px dashed #222;
        }
        .user-info-brief span {
            color: #00ff7f;
            font-weight: bold;
        }
        
        /* Cụm nút chuyển đổi giữa Ngân hàng và Thẻ cào */
        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            background: #111;
            border: 1px solid #333;
            color: #888;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            font-size: 13px;
            transition: 0.3s;
        }
        .tab-btn.active {
            border-color: #00ff7f;
            color: #00ff7f;
            background: rgba(0, 255, 127, 0.05);
            box-shadow: 0 0 10px rgba(0, 255, 127, 0.1);
        }

        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }

        .input-group {
            margin-bottom: 18px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            color: #aaa;
        }
        .input-group input, .input-group select {
            width: 100%;
            padding: 12px;
            background-color: #111;
            border: 1px solid #333;
            border-radius: 5px;
            color: #fff;
            box-sizing: border-box;
            font-size: 15px;
            font-weight: bold;
        }
        .input-group input:focus, .input-group select:focus {
            border-color: #00ff7f;
            outline: none;
            box-shadow: 0 0 10px rgba(0,255,127,0.2);
        }
        
        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: #00ff7f;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            color: #000;
            cursor: pointer;
            font-size: 15px;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .btn-submit:hover {
            background-color: #fff;
            box-shadow: 0 0 15px #00ff7f;
        }

        /* QR Area */
        #qr-area {
            margin-top: 15px;
            padding-top: 10px;
            display: none;
        }
        .qr-box {
            background: white;
            padding: 15px;
            border-radius: 10px;
            display: inline-block;
            margin-bottom: 15px;
        }
        .qr-box img {
            max-width: 210px;
            display: block;
        }
        .memo-box {
            background: #111;
            border: 1px solid #ffaa00;
            padding: 12px;
            border-radius: 5px;
            text-align: left;
            margin-bottom: 15px;
        }
        .memo-title {
            font-size: 12px;
            color: #ffaa00;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .memo-text {
            font-family: monospace;
            font-size: 16px;
            color: #fff;
            font-weight: bold;
        }
        .back-home {
            display: block;
            margin-top: 25px;
            color: #6d887d;
            text-decoration: none;
            font-size: 14px;
        }
        .back-home:hover {
            color: #00ff7f;
        }
        .warning-text {
            font-size: 12px;
            color: #ff3333;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="nap-container">
        <h2>NẠP TIỀN HỆ THỐNG</h2>
        
        <div class="user-info-brief" id="user-display">
            Đang kiểm tra tài khoản...
        </div>

        <div class="tab-buttons">
            <button class="tab-btn active" onclick="switchTab('atm')"><i class="fa-solid fa-qrcode"></i> Ngân Hàng (QR)</button>
            <button class="tab-btn" onclick="switchTab('card')"><i class="fa-solid fa-id-card"></i> Thẻ Cào ĐT</button>
        </div>

        <div id="tab-atm" class="tab-content active">
            <div id="form-atm-input">
                <div class="input-group">
                    <label>Nhập số tiền muốn nạp (VNĐ)</label>
                    <input type="number" id="amount-input" min="10000" placeholder="Ví dụ: 50000">
                </div>
                <button onclick="generateQRCode()" class="btn-submit">TẠO MÃ QR THANH TOÁN</button>
            </div>

            <div id="qr-area">
                <p style="color: #00ff7f; font-weight: bold; margin-top: 0;">QUÉT MÃ QR ĐỂ CHUYỂN KHOẢN</p>
                <div class="qr-box">
                    <img id="qr-image" src="" alt="Mã QR">
                </div>
                <div class="memo-box">
                    <div class="memo-title"><i class="fa-solid fa-triangle-exclamation"></i> NỘI DUNG CHUYỂN KHOẢN (BẮT BUỘC)</div>
                    <div class="memo-text" id="memo-content">VEYRONISNAP...</div>
                </div>
                <p class="warning-text">* Vui lòng giữ nguyên nội dung khi quét.</p>
                <button onclick="cancelQR()" style="background:none; border: 1px solid #555; color:#888; padding:5px 10px; border-radius:4px; cursor:pointer; font-size:12px;">Nhập lại số tiền</button>
            </div>
        </div>

        <div id="tab-card" class="tab-content">
            <form id="card-form" onsubmit="handleCardSubmit(event)">
                <div class="input-group">
                    <label>Chọn nhà mạng</label>
                    <select id="card-type" required>
                        <option value="">-- Chọn nhà mạng --</option>
                        <option value="VIETTEL">Viettel</option>
                        <option value="VINAPHONE">Vinaphone</option>
                        <option value="MOBIFONE">Mobifone</option>
                        <option value="ZING">Thẻ Zing</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Mệnh giá thẻ</label>
                    <select id="card-value" required>
                        <option value="">-- Chọn mệnh giá --</option>
                        <option value="10000">10,000đ</option>
                        <option value="20000">20,000đ</option>
                        <option value="50000">50,000đ</option>
                        <option value="100000">100,000đ</option>
                        <option value="200000">200,000đ</option>
                        <option value="500000">500,000đ</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Mã số thẻ (Dưới lớp bạc)</label>
                    <input type="text" id="card-code" placeholder="Nhập mã thẻ" required autocomplete="off">
                </div>
                <div class="input-group">
                    <label>Số Seri thẻ</label>
                    <input type="text" id="card-seri" placeholder="Nhập số seri" required autocomplete="off">
                </div>
                <button type="submit" class="btn-submit">GỬI THẺ CÀO DUYỆT</button>
            </form>
        </div>

        <a href="index.html" class="back-home">← Quay lại trang chủ</a>
    </div>

<script>
    // --- CẤU HÌNH NGÂN HÀNG CỦA BẠN ---
    const BANK_BIN = "MB"; 
    const BANK_ACCOUNT = "0987654321"; 
    const BANK_NAME = "NGUYEN VAN MANH"; 

    let currentUser = null;

    document.addEventListener("DOMContentLoaded", function() {
        currentUser = JSON.parse(localStorage.getItem('currentUser'));
        const userDisplay = document.getElementById('user-display');
        
        if (!currentUser) {
            userDisplay.innerHTML = `<span style="color: #ff3333;">Bạn chưa đăng nhập! Vui lòng <a href="taikhoan.html" style="color:#00ff7f;">Đăng nhập</a> trước.</span>`;
            document.getElementById('tab-atm').style.display = 'none';
            document.querySelector('.tab-buttons').style.display = 'none';
        } else {
            userDisplay.innerHTML = `Tài khoản nạp: <span>${currentUser.email || currentUser.phone}</span>`;
        }
    });

    // Hàm chuyển đổi qua lại giữa các Tab bấm
    function switchTab(type) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
        
        if(type === 'atm') {
            document.querySelectorAll('.tab-btn')[0].classList.add('active');
            document.getElementById('tab-atm').classList.add('active');
        } else {
            document.querySelectorAll('.tab-btn')[1].classList.add('active');
            document.getElementById('tab-card').classList.add('active');
        }
    }

    // Xử lý tạo QR ATM
    function generateQRCode() {
        const amount = document.getElementById('amount-input').value;
        if (!amount || amount < 10000) { alert("Tối thiểu 10,000 VNĐ"); return; }
        const displayUser = currentUser.email || currentUser.phone;
        const cleanIdentifier = displayUser.split('@')[0].replace(/[^a-zA-Z0-9]/g, "").toUpperCase();
        const memo = `VEYRONISNAP${cleanIdentifier}`;
        
        document.getElementById('qr-image').src = `https://img.vietqr.io/image/${BANK_BIN}-${BANK_ACCOUNT}-compact2.png?amount=${amount}&addInfo=${encodeURIComponent(memo)}&accountName=${encodeURIComponent(BANK_NAME)}`;
        document.getElementById('memo-content').innerText = memo;
        document.getElementById('form-atm-input').style.display = 'none';
        document.getElementById('qr-area').style.display = 'block';
    }

    function cancelQR() {
        document.getElementById('form-atm-input').style.display = 'block';
        document.getElementById('qr-area').style.display = 'none';
    }

    // Xử lý gửi thẻ cào
    function handleCardSubmit(e) {
        e.preventDefault();
        
        const type = document.getElementById('card-type').value;
        const value = document.getElementById('card-value').value;
        const code = document.getElementById('card-code').value;
        const seri = document.getElementById('card-seri').value;

        // Thông báo tạm thời để giao diện vận hành hoàn hảo trước khi kết nối API Backend thật
        alert(`Gửi thẻ thành công!\nHệ thống đang kiểm tra thẻ:\n- Loại: ${type}\n- Mệnh giá: ${value}đ\n- Mã thẻ: ${code}\n- Seri: ${seri}\nVui lòng chờ 1-3 phút để duyệt thẻ.`);
        
        // Reset lại form nhập liệu
        document.getElementById('card-form').reset();
    }
</script>
</body>
</html>
