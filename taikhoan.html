<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tài Khoản Dịch Vụ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .top-nav {
            position: absolute;
            top: 20px;
            right: 20px;
        }
        .nav-btn {
            background: none;
            border: 1px solid #00ff7f;
            color: #00ff7f;
            padding: 8px 16px;
            margin-left: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .nav-btn.active, .nav-btn:hover {
            background-color: #00ff7f;
            color: #000;
        }
        .auth-container {
            border: 2px solid #00ff7f;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 255, 127, 0.3);
            width: 350px;
            text-align: center;
            background-color: #050505;
        }
        h2 {
            color: #00ff7f;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 13px;
            color: #888;
        }
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-group input {
            width: 100%;
            padding: 10px;
            padding-right: 35px;
            background-color: #111;
            border: 1px solid #222;
            border-radius: 5px;
            color: #fff;
            box-sizing: border-box;
        }
        .password-wrapper i {
            position: absolute;
            right: 12px;
            color: #888;
            cursor: pointer;
        }
        .password-wrapper i:hover {
            color: #00ff7f;
        }
        .forgot-password {
            display: block;
            text-align: right;
            margin-top: -5px;
            margin-bottom: 15px;
            font-size: 12px;
            color: #888;
            cursor: pointer;
            text-decoration: none;
        }
        .forgot-password:hover {
            color: #00ff7f;
            text-decoration: underline;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background-color: #00ff7f;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            color: #000;
            cursor: pointer;
            margin-top: 10px;
        }
        .switch-form {
            margin-top: 20px;
            font-size: 13px;
            color: #888;
        }
        .switch-form a {
            color: #00ff7f;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
        }
        .switch-form a:hover {
            text-decoration: underline;
        }
        .back-home {
            display: block;
            margin-top: 25px;
            color: #6d887d;
            text-decoration: none;
            font-size: 14px;
        }
        .back-home:hover {
            color: #00ff7f;
        }
        /* --- Khung thông báo Toast màu xanh đen viền neon --- */
#toast-notification {
    position: fixed;
    top: 20px;
    right: 20px;
    background-color: #050505;
    color: #fff;
    border: 2px solid #00ff7f;
    padding: 15px 25px;
    border-radius: 8px;
    box-shadow: 0 0 15px rgba(0, 255, 127, 0.4);
    font-weight: bold;
    font-family: Arial, sans-serif;
    z-index: 9999;
    transition: opacity 0.5s ease, transform 0.5s ease;
}
.toast-hidden {
    opacity: 0;
    transform: translateY(-20px);
    pointer-events: none;
}
.toast-show {
    opacity: 1;
    transform: translateY(0);
}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="toast-notification" class="toast-hidden">
        <span id="toast-message">Thông báo</span>
    </div>

<div class="top-nav">
    <button id="nav-login-btn" class="nav-btn active" onclick="showForm('login')">Đăng Nhập</button>
    <button id="nav-register-btn" class="nav-btn" onclick="showForm('register')">Đăng Ký</button>
</div>

<div class="auth-container">

    <div id="login-form">
        <h2>ĐĂNG NHẬP</h2>
        <form onsubmit="handleAuth(event, 'login')">
            <div class="input-group">
                <label>Tài khoản (Gmail hoặc Số điện thoại)</label>
                <input type="text" id="login-user" required placeholder="Nhập Gmail hoặc SĐT của bạn...">
            </div>
            <div class="input-group">
                <label>Mật khẩu</label>
                <div class="password-wrapper">
                    <input type="password" id="login-pass" required placeholder="Nhập mật khẩu...">
                    <i class="fa-solid fa-eye-slash" onclick="togglePassword('login-pass', this)"></i>
                </div>
            </div>

            <a class="forgot-password" onclick="handleForgotPassword()">Bạn quên mật khẩu?</a>

            <button type="submit" class="btn">VÀO HỆ THỐNG</button>
        </form>
        <div class="switch-form">
            Chưa có tài khoản? <a onclick="showForm('register')">Đăng ký ngay</a>
        </div>
    </div>

    <div id="register-form" style="display: none;">
        <h2>ĐĂNG KÝ</h2>
        <form onsubmit="handleAuth(event, 'register')">
            <div class="input-group">
                <label>Tài khoản (Gmail hoặc Số điện thoại)</label>
                <input type="text" id="reg-user" required placeholder="Nhập Gmail hoặc SĐT đăng ký...">
            </div>
            <div class="input-group">
                <label>Mật khẩu</label>
                <div class="password-wrapper">
                    <input type="password" id="reg-pass" required placeholder="Tạo mật khẩu bảo mật...">
                    <i class="fa-solid fa-eye-slash" onclick="togglePassword('reg-pass', this)"></i>
                </div>
            </div>
            <div class="input-group">
                <label>Xác nhận lại mật khẩu</label>
                <div class="password-wrapper">
                    <input type="password" id="reg-confirm-pass" required placeholder="Nhập lại mật khẩu phía trên...">
                    <i class="fa-solid fa-eye-slash" onclick="togglePassword('reg-confirm-pass', this)"></i>
                </div>
            </div>
            <button type="submit" class="btn">TẠO TÀI KHOẢN</button>
        </form>
        <div class="switch-form">
            Đã có tài khoản? <a onclick="showForm('login')">Đăng nhập</a>
        </div>
    </div>

    <a href="index.html" class="back-home">← Quay lại trang chủ</a>
</div>
<div id="toast-notification" class="toast-hidden">
    <span id="toast-message">Thông báo</span>
</div>

<script>
    // Cấu hình kết nối kho lưu trữ đám mây Supabase
const supabaseUrl = 'https://lxdoaaygwvsrbqendevw.supabase.co';
const supabaseKey = 'sb_publishable_g1ov_vwAvrkSwf9J5hKgrg_pSWn57dl
const _supabase = supabase.createClient(supabaseUrl, supabaseKey);
// 1. Hàm chuyển đổi hiển thị qua lại giữa Form Đăng Nhập và Đăng Ký
function showForm(type) {
    var loginForm = document.getElementById('login-form');
    var registerForm = document.getElementById('register-form');
    var navLogin = document.getElementById('nav-login-btn');
    var navRegister = document.getElementById('nav-register-btn');

    if (type === 'register') {
        registerForm.style.display = 'block';
        loginForm.style.display = 'none';
        navRegister.classList.add('active');
        navLogin.classList.remove('active');
    } else if (type === 'login') {
        loginForm.style.display = 'block';
        registerForm.style.display = 'none';
        navLogin.classList.add('active');
        navRegister.classList.remove('active');
    }
}

// 2. Hàm bật/tắt ẩn hiện mật khẩu (Xử lý hình con mắt)
function togglePassword(inputId, iconElement) {
    var passwordInput = document.getElementById(inputId);
    if (passwordInput.type === "password") {
        passwordInput.type = "text";
        iconElement.classList.remove("fa-eye-slash");
        iconElement.classList.add("fa-eye");
    } else {
        passwordInput.type = "password";
        iconElement.classList.remove("fa-eye");
        iconElement.classList.add("fa-eye-slash");
    }
}

// 3. Hàm xử lý sự kiện khi ấn vào "Bạn quên mật khẩu?"
function handleForgotPassword() {
    alert("Hệ thống khôi phục mật khẩu tự động đang được cập nhật. Vui lòng liên hệ bộ phận hỗ trợ kỹ thuật!");
}

// 4. Hàm xử lý logic kiểm tra định dạng tài khoản đăng nhập / đăng ký
// 4. Hàm hiển thị thông báo Toast thay thế alert()
function showToast(message, borderColor = "#00ff7f") {
    const toast = document.getElementById('toast-notification');
    const toastMsg = document.getElementById('toast-message');
    
    if (!toast || !toastMsg) return; // Bảo vệ nếu chưa load xong HTML
    
    toastMsg.innerText = message;
    toast.style.borderColor = borderColor; 
    toast.style.boxShadow = `0 0 15px ${borderColor}66`;

    toast.classList.remove('toast-hidden');
    toast.classList.add('toast-show');

    // Tự động ẩn sau 3 giây
    setTimeout(() => {
        toast.classList.remove('toast-show');
        toast.classList.add('toast-hidden');
    }, 3000);
}

// 5. Hàm xử lý Đăng ký / Đăng nhập & lưu LocalStorage mới
// 3. Hàm xử lý Đăng Ký và Đăng Nhập kết nối trực tiếp với Supabase Đám Mây
async function handleAuth(event, type) {
    event.preventDefault();

    // Tự động tìm input theo form đăng ký hoặc đăng nhập
    const loginUserEl = document.getElementById('login-username');
    const regUserEl = document.getElementById('reg-username');
    const userInput = type === 'register' 
        ? (regUserEl ? regUserEl.value.trim() : "") 
        : (loginUserEl ? loginUserEl.value.trim() : "");

    if (!userInput) {
        showToast("Vui lòng nhập định dạng Gmail hoặc Số điện thoại!", "#ff3333");
        return;
    }

    // ---------------- KHU VỰC XỬ LÝ ĐĂNG KÝ ----------------
    if (type === 'register') {
        const pass = document.getElementById('reg-pass').value;
        const confirmPass = document.getElementById('reg-confirm-pass').value;

        if (pass !== confirmPass) {
            showToast("Mật khẩu xác nhận không khớp!", "#ff3333");
            return;
        }

        showToast("Đang xử lý đăng ký...", "#ffaa00");

        if (userInput.includes('@')) {
            // Đăng ký bằng GMAIL
            const { data, error } = await _supabase.auth.signUp({
                email: userInput,
                password: pass,
            });

            if (error) {
                showToast("Lỗi: " + error.message, "#ff3333");
            } else {
                showToast("Đăng Ký Thành Công! Vui lòng kiểm tra hộp thư Gmail để bấm link xác thực.", "#00ff7f");
                setTimeout(() => showForm('login'), 3000);
            }
        } else {
            // Đăng ký bằng SỐ ĐIỆN THOẠI (+84)
            let phoneFormatted = userInput;
            if (phoneFormatted.startsWith('0')) {
                phoneFormatted = '+84' + phoneFormatted.slice(1);
            }

            const { data, error } = await _supabase.auth.signUp({
                phone: phoneFormatted,
                password: pass,
            });

            if (error) {
                showToast("Lỗi: " + error.message, "#ff3333");
            } else {
                showToast("Đăng ký thành công! Đang gửi mã OTP về điện thoại...", "#00ff7f");
            }
        }
    } 
    // ---------------- KHU VỰC XỬ LÝ ĐĂNG NHẬP ----------------
    else {
        const loginPass = document.getElementById('login-pass').value;
        showToast("Đang kiểm tra đăng nhập...", "#ffaa00");

        let authConfig = { password: loginPass };
        if (userInput.includes('@')) {
            authConfig.email = userInput;
        } else {
            let phoneFormatted = userInput;
            if (phoneFormatted.startsWith('0')) {
                phoneFormatted = '+84' + phoneFormatted.slice(1);
            }
            authConfig.phone = phoneFormatted;
        }

        const { data, error } = await _supabase.auth.signInWithPassword(authConfig);

        if (error) {
            showToast("Đăng nhập thất bại: " + error.message, "#ff3333");
        } else {
            showToast("Đăng nhập thành công!", "#00ff7f");
        }
    }
}
</script>

</body>
</html>
