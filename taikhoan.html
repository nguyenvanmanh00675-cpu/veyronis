<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tài Khoản Dịch Vụ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .top-nav {
            position: absolute;
            top: 20px;
            right: 20px;
        }
        .nav-btn {
            background: none;
            border: 1px solid #00ff7f;
            color: #00ff7f;
            padding: 8px 16px;
            margin-left: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .nav-btn.active, .nav-btn:hover {
            background-color: #00ff7f;
            color: #000;
        }
        .auth-container {
            border: 2px solid #00ff7f;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 255, 127, 0.3);
            width: 350px;
            text-align: center;
            background-color: #050505;
        }
        h2 {
            color: #00ff7f;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 13px;
            color: #888;
        }
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-group input {
            width: 100%;
            padding: 10px;
            padding-right: 35px;
            background-color: #111;
            border: 1px solid #222;
            border-radius: 5px;
            color: #fff;
            box-sizing: border-box;
        }
        .password-wrapper i {
            position: absolute;
            right: 12px;
            color: #888;
            cursor: pointer;
        }
        .password-wrapper i:hover {
            color: #00ff7f;
        }
        .forgot-password {
            display: block;
            text-align: right;
            margin-top: -5px;
            margin-bottom: 15px;
            font-size: 12px;
            color: #888;
            cursor: pointer;
            text-decoration: none;
        }
        .forgot-password:hover {
            color: #00ff7f;
            text-decoration: underline;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background-color: #00ff7f;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            color: #000;
            cursor: pointer;
            margin-top: 10px;
        }
        .switch-form {
            margin-top: 20px;
            font-size: 13px;
            color: #888;
        }
        .switch-form a {
            color: #00ff7f;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
        }
        .switch-form a:hover {
            text-decoration: underline;
        }
        .back-home {
            display: block;
            margin-top: 25px;
            color: #6d887d;
            text-decoration: none;
            font-size: 14px;
        }
        .back-home:hover {
            color: #00ff7f;
        }
        
        /* --- Khung thông báo Toast màu xanh đen viền neon --- */
        #toast-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: #050505;
            color: #fff;
            border: 2px solid #00ff7f;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 255, 127, 0.4);
            font-weight: bold;
            font-family: Arial, sans-serif;
            z-index: 9999;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .toast-hidden {
            opacity: 0;
            transform: translateY(-20px);
            pointer-events: none;
        }
        .toast-show {
            opacity: 1;
            transform: translateY(0);
        }
        .error-text-small {
            color: #ff3333;
            font-size: 12px;
            margin-top: 6px;
            text-align: left;
            font-weight: 500;
        }

        /* --- Giao diện Khung Profile Người dùng sau khi đăng nhập --- */
        #profile-box {
            text-align: center;
            padding: 10px 0;
        }
        .profile-avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 3px solid #00ff7f;
            background-color: #111;
            margin-bottom: 15px;
            box-shadow: 0 0 15px rgba(0, 255, 127, 0.3);
        }
        .profile-name {
            font-size: 18px;
            font-weight: bold;
            color: #00ff7f;
            margin-bottom: 5px;
            word-break: break-all;
        }
        .profile-status {
            font-size: 12px;
            color: #888;
            margin-bottom: 25px;
        }
        .logout-btn {
            width: 100%;
            padding: 10px;
            background-color: #transparent;
            border: 1px solid #ff3333;
            color: #ff3333;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .logout-btn:hover {
            background-color: #ff3333;
            color: #000;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="toast-notification" class="toast-hidden">
        <span id="toast-message">Thông báo</span>
    </div>

    <div class="top-nav" id="nav-buttons-container">
        <button id="nav-login-btn" class="nav-btn active" onclick="showForm('login')">Đăng Nhập</button>
        <button id="nav-register-btn" class="nav-btn" onclick="showForm('register')">Đăng Ký</button>
    </div>

    <div class="auth-container">
        <div id="profile-box" style="display: none;">
            <h2>HỒ SƠ CỦA BẠN</h2>
            <img id="user-avatar" src="" alt="Avatar" class="profile-avatar">
            <div id="user-display-name" class="profile-name">Username</div>
            <div class="profile-status"><i class="fa-solid fa-circle" style="color: #00ff7f; font-size: 10px; margin-right: 5px;"></i> Đang hoạt động trên Đám Mây</div>
            <button onclick="handleLogout()" class="logout-btn">ĐĂNG XUẤT TÀI KHOẢN</button>
        </div>

        <div id="login-form">
            <h2>ĐĂNG NHẬP</h2>
            <form onsubmit="handleAuth(event, 'login')">
                <div class="input-group">
                    <label>Tài khoản (Gmail hoặc Số điện thoại)</label>
                    <input type="text" id="login-user" required placeholder="Nhập Gmail hoặc SĐT của bạn...">
                </div>
                <div class="input-group">
                    <label>Mật khẩu</label>
                    <div class="password-wrapper">
                        <input type="password" id="login-pass" required placeholder="Nhập mật khẩu...">
                        <i class="fa-solid fa-eye-slash" onclick="togglePassword('login-pass', this)"></i>
                    </div>
                </div>
                <a class="forgot-password" onclick="handleForgotPassword()">Bạn quên mật khẩu?</a>
                <button type="submit" class="btn">VÀO HỆ THỐNG</button>
            </form>
            <div class="switch-form">
                Chưa có tài khoản? <a onclick="showForm('register')">Đăng ký ngay</a>
            </div>
        </div>

        <div id="register-form" style="display: none;">
            <h2>ĐĂNG KÝ</h2>
            <form onsubmit="handleAuth(event, 'register')">
                <div class="input-group">
                    <label>Tài khoản (Gmail hoặc Số điện thoại)</label>
                    <input type="text" id="reg-user" required placeholder="Nhập Gmail hoặc SĐT đăng ký...">
                </div>
                <div class="input-group">
                    <label>Mật khẩu</label>
                    <div class="password-wrapper">
                        <input type="password" id="reg-pass" required placeholder="Tạo mật khẩu bảo mật...">
                        <i class="fa-solid fa-eye-slash" onclick="togglePassword('reg-pass', this)"></i>
                    </div>
                </div>
                <div class="input-group">
                    <label>Xác nhận lại mật khẩu</label>
                    <div class="password-wrapper">
                        <input type="password" id="reg-confirm-pass" required placeholder="Nhập lại mật khẩu phía trên...">
                        <i class="fa-solid fa-eye-slash" onclick="togglePassword('reg-confirm-pass', this)"></i>
                    </div>
                </div>
                <button type="submit" class="btn">TẠO TÀI KHOẢN</button>
            </form>
            <div class="switch-form">
                Đã có tài khoản? <a onclick="showForm('login')">Đăng nhập</a>
            </div>
        </div>

        <a href="index.html" class="back-home">← Quay lại trang chủ</a>
    </div>

<script>
// Cấu hình kết nối kho lưu trữ đám mây Supabase
const supabaseUrl = 'https://lxdoaaygwvsrbqendevw.supabase.co';
const supabaseKey = 'sb_publishable_g1ov_vwAvrkSwf9J5hKgrg_pSWn57dl'; 
const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

// HÀM TỰ ĐỘNG KIỂM TRA ĐĂNG NHẬP ĐỂ ĐỔI GIAO DIỆN THÀNH PROFILE TRÒN
function checkUserSession() {
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
    const profileBox = document.getElementById('profile-box');
    const loginForm = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');
    const navButtons = document.getElementById('nav-buttons-container');

    if (currentUser) {
        // Nếu có user: Ẩn hết form đăng nhập/đăng ký, hiện khung hình Profile đại diện
        if(loginForm) loginForm.style.display = 'none';
        if(registerForm) registerForm.style.display = 'none';
        if(navButtons) navButtons.style.display = 'none';
        if(profileBox) profileBox.style.display = 'block';

        const displayUser = currentUser.email || currentUser.phone || "Người dùng";
        document.getElementById('user-display-name').innerText = displayUser;
        // Tạo avatar hình Robot ngẫu nhiên theo tên bảo mật cực đẹp
        document.getElementById('user-avatar').src = `https://api.dicebear.com/7.x/bottts/svg?seed=${encodeURIComponent(displayUser)}`;
    }
}

// Chạy kiểm tra ngay khi mở trang web lên
document.addEventListener("DOMContentLoaded", checkUserSession);

// Hàm Đăng xuất
function handleLogout() {
    localStorage.removeItem('currentUser');
    showToast("Đang đăng xuất...", "#ff3333");
    setTimeout(() => {
        window.location.reload();
    }, 1000);
}

// 1. Hàm chuyển đổi hiển thị qua lại giữa Form Đăng Nhập và Đăng Ký
function showForm(type) {
    if (localStorage.getItem('currentUser')) return; // Đã đăng nhập thì không đổi form
    
    var loginForm = document.getElementById('login-form');
    var registerForm = document.getElementById('register-form');
    var navLogin = document.getElementById('nav-login-btn');
    var navRegister = document.getElementById('nav-register-btn');

    document.querySelectorAll('.error-text-small').forEach(el => el.remove());

    if (type === 'register') {
        registerForm.style.display = 'block';
        loginForm.style.display = 'none';
        navRegister.classList.add('active');
        navLogin.classList.remove('active');
    } else if (type === 'login') {
        loginForm.style.display = 'block';
        registerForm.style.display = 'none';
        navLogin.classList.add('active');
        navRegister.classList.remove('active');
    }
}

// 2. Hàm bật/tắt ẩn hiện mật khẩu (Xử lý hình con mắt)
function togglePassword(inputId, iconElement) {
    var passwordInput = document.getElementById(inputId);
    if (passwordInput.type === "password") {
        passwordInput.type = "text";
        iconElement.classList.remove("fa-eye-slash");
        iconElement.classList.add("fa-eye");
    } else {
        passwordInput.type = "password";
        iconElement.classList.remove("fa-eye");
        iconElement.classList.add("fa-eye-slash");
    }
}

// 3. Hàm xử lý sự kiện khi ấn vào "Bạn quên mật khẩu?"
function handleForgotPassword() {
    showToast("Tính năng khôi phục đang được cập nhật qua Supabase!", "#ffaa00");
}

// 4. Hàm hiển thị thông báo Toast thay thế alert()
function showToast(message, borderColor = "#00ff7f") {
    const toast = document.getElementById('toast-notification');
    const toastMsg = document.getElementById('toast-message');
    
    if (!toast || !toastMsg) return;
    
    toastMsg.innerText = message;
    toast.style.borderColor = borderColor; 
    toast.style.boxShadow = `0 0 15px ${borderColor}66`;

    toast.classList.remove('toast-hidden');
    toast.classList.add('toast-show');

    setTimeout(() => {
        toast.classList.remove('toast-show');
        toast.classList.add('toast-hidden');
    }, 3000);
}

// 5. Hàm xử lý Đăng Ký và Đăng Nhập kết nối trực tiếp với Supabase Đám Mây
async function handleAuth(event, type) {
    event.preventDefault();

    // Xóa sạch các dòng chữ lỗi đỏ cũ trước khi kiểm tra lượt mới
    document.querySelectorAll('.error-text-small').forEach(el => el.remove());

    const userInput = type === 'register' 
        ? document.getElementById('reg-user').value.trim() 
        : document.getElementById('login-user').value.trim();

    // Hàm phụ dùng để in chữ lỗi nhỏ màu đỏ ngay dưới ô Mật khẩu tương ứng
    function showErrorUnderPassword(formType, msgText) {
        const targetPassInput = document.getElementById(formType === 'register' ? 'reg-pass' : 'login-pass');
        if (targetPassInput) {
            const errDiv = document.createElement('div');
            errDiv.className = 'error-text-small';
            errDiv.innerText = msgText;
            targetPassInput.parentNode.appendChild(errDiv);
        }
    }

    // ---------------- KHU VỰC XỬ LÝ ĐĂNG KÝ ----------------
    if (type === 'register') {
        const pass = document.getElementById('reg-pass').value;
        const confirmPass = document.getElementById('reg-confirm-pass').value;

        if (pass !== confirmPass) {
            showErrorUnderPassword('register', "Mật khẩu xác nhận không khớp!");
            return;
        }

        showToast("Đang xử lý đăng ký...", "#ffaa00");

        if (userInput.includes('@')) {
            // Đăng ký bằng GMAIL
            const { data, error } = await _supabase.auth.signUp({
                email: userInput,
                password: pass,
            });

            if (error) {
                showErrorUnderPassword('register', "Lỗi: " + error.message);
            } else {
                showToast("Đăng Ký Thành Công! Vui lòng kiểm tra hộp thư Gmail để bấm link xác thực.", "#00ff7f");
                setTimeout(() => showForm('login'), 4000);
            }
        } else {
            // Đăng ký bằng SỐ ĐIỆN THOẠI
            let phoneFormatted = userInput;
            if (phoneFormatted.startsWith('0')) {
                phoneFormatted = '+84' + phoneFormatted.slice(1);
            }

            const { data, error } = await _supabase.auth.signUp({
                phone: phoneFormatted,
                password: pass,
            });

            if (error) {
                showErrorUnderPassword('register', "Lỗi: " + error.message);
            } else {
                showToast("Đăng ký thành công! Đang gửi mã OTP về điện thoại...", "#00ff7f");
            }
        }
    } 
    // ---------------- KHU VỰC XỬ LÝ ĐĂNG NHẬP ----------------
    else {
        const loginPass = document.getElementById('login-pass').value;
        showToast("Đang kiểm tra đăng nhập...", "#ffaa00");

        let authConfig = { password: loginPass };
        if (userInput.includes('@')) {
            authConfig.email = userInput;
        } else {
            let phoneFormatted = userInput;
            if (phoneFormatted.startsWith('0')) {
                phoneFormatted = '+84' + phoneFormatted.slice(1);
            }
            authConfig.phone = phoneFormatted;
        }

        const { data, error } = await _supabase.auth.signInWithPassword(authConfig);

        if (error) {
            // ĐÃ THÊM THEO YÊU CẦU: Hiện chữ nhỏ báo lỗi màu đỏ khi sai tài khoản/mật khẩu
            showErrorUnderPassword('login', "Mật khẩu hoặc Tài khoản không đúng.");
        } else {
            showToast("Đăng nhập thành công!", "#00ff7f");
            
            // Lưu dữ liệu đăng nhập vào localStorage
            localStorage.setItem('currentUser', JSON.stringify(data.user));
            
            // Chạy hàm đổi giao diện thành Profile ngay lập tức
            checkUserSession();
        }
    }
}
</script>
</body>
</html>
