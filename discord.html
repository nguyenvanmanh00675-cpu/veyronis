<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Dịch Vụ Discord</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 40px 20px;
      background-color: #050b08;
      font-family: "Courier New", monospace;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    h1 {
      color: #00ff77;
      margin-bottom: 40px;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(0, 255, 119, 0.5);
      animation: fadeInDown 0.8s ease-out;
      text-align: center;
    }

    /* Khu vực danh sách dịch vụ */
    .services-section {
      max-width: 800px;
      width: 100%;
      background-color: #000;
      border: 1px solid #17352a;
      border-radius: 12px;
      padding: 30px;
      animation: slideDown 0.6s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
      margin-bottom: 30px;
    }

    /* Từng ô dịch vụ */
    .service-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px;
      background-color: #050b08;
      border: 1px solid #17352a;
      border-radius: 8px;
      margin-bottom: 15px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .service-card:hover {
      border-color: #00ff77;
      box-shadow: 0 0 10px rgba(0, 255, 119, 0.2);
      transform: scale(1.01);
    }

    .service-card.selected {
      border-color: #00ff77;
      background-color: rgba(0, 255, 119, 0.05);
    }

    /* Trạng thái Bảo Trì: khóa lựa chọn */
    .service-card.locked {
      cursor: not-allowed;
      opacity: 0.55;
      border-color: #3a1414;
    }
    .service-card.locked:hover {
      border-color: #3a1414;
      box-shadow: none;
      transform: none;
    }
    .maintenance-badge {
      color: #ff4d4d;
      font-weight: bold;
      font-size: 13px;
      letter-spacing: 1px;
    }

    .service-info {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    /* Checkbox custom */
    .custom-checkbox {
      width: 20px;
      height: 20px;
      border: 2px solid #17352a;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .service-card.selected .custom-checkbox {
      background-color: #00ff77;
      border-color: #00ff77;
    }

    .custom-checkbox::after {
      content: "✓";
      color: #000;
      font-weight: bold;
      font-size: 14px;
      display: none;
    }

    .service-card.selected .custom-checkbox::after {
      display: block;
    }

    .service-name {
      font-size: 16px;
      font-weight: bold;
    }

    .service-price {
      color: #00ff77;
      font-weight: bold;
      font-size: 18px;
    }

    /* Bảng Tổng Tiền */
    .total-box {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 25px;
      padding-top: 20px;
      border-top: 2px dashed #17352a;
    }

    .total-title {
      font-size: 18px;
      font-weight: bold;
      text-transform: uppercase;
    }

    .total-amount {
      color: #00ff77;
      font-size: 26px;
      font-weight: bold;
      text-shadow: 0 0 10px rgba(0, 255, 119, 0.4);
    }

    /* Nút Thanh Toán */
    .pay-btn {
      width: 100%;
      margin-top: 18px;
      padding: 16px;
      background-color: #00ff77;
      border: none;
      border-radius: 8px;
      color: #000;
      font-weight: bold;
      font-size: 16px;
      letter-spacing: 1px;
      cursor: pointer;
      text-transform: uppercase;
      transition: 0.3s;
    }
    .pay-btn:hover {
      background-color: #fff;
      box-shadow: 0 0 20px #00ff77;
    }
    .pay-btn:disabled {
      background-color: #222;
      color: #555;
      cursor: not-allowed;
      box-shadow: none;
    }

    /* Ô Nitro có menu thả xuống chọn thời hạn */
    .nitro-card {
      flex-direction: column;
      align-items: stretch;
      padding: 0;
      overflow: hidden;
    }
    .nitro-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px;
    }
    .nitro-chevron {
      color: #6d887d;
      transition: transform 0.25s ease;
      margin-left: 10px;
    }
    .nitro-card.open .nitro-chevron {
      transform: rotate(180deg);
      color: #00ff77;
    }
    .nitro-options {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
      border-top: 1px solid #17352a;
    }
    .nitro-card.open .nitro-options {
      max-height: 300px;
    }
    .nitro-option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid #10231b;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    .nitro-option:last-child { border-bottom: none; }
    .nitro-option:hover { background: rgba(0, 255, 119, 0.05); }
    .nitro-option.selected {
      background: rgba(0, 255, 119, 0.08);
      color: #00ff77;
    }
    .nitro-option.selected .custom-checkbox {
      background-color: #00ff77;
      border-color: #00ff77;
    }
    .nitro-option.selected .custom-checkbox::after {
      content: "✓";
      color: #000;
      font-weight: bold;
      font-size: 12px;
      display: block;
    }
    .nitro-option.locked {
      cursor: not-allowed;
      opacity: 0.55;
    }
    .nitro-option.locked:hover { background: none; }
    .nitro-option .custom-checkbox {
      width: 18px;
      height: 18px;
    }
    .nitro-option-name {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
    }
    .nitro-option-price {
      color: #00ff77;
      font-weight: bold;
      font-size: 15px;
    }

    /* Nút quay lại */
    .back-btn {
      color: #6d887d;
      text-decoration: none;
      font-size: 14px;
      transition: color 0.3s;
      margin-top: 20px;
    }
    .back-btn:hover {
      color: #00ff77;
    }

    /* Toast thông báo */
    #toast-notification {
        position: fixed;
        top: 20px;
        right: 20px;
        background-color: #050505;
        color: #fff;
        border: 2px solid #00ff7f;
        padding: 15px 25px;
        border-radius: 8px;
        box-shadow: 0 0 15px rgba(0, 255, 127, 0.4);
        font-weight: bold;
        font-family: Arial, sans-serif;
        z-index: 9999;
        transition: opacity 0.5s ease, transform 0.5s ease;
        max-width: 320px;
        white-space: pre-line;
    }
    .toast-hidden { opacity: 0; transform: translateY(-20px); pointer-events: none; }
    .toast-show { opacity: 1; transform: translateY(0); }

    /* Animations */
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div id="toast-notification" class="toast-hidden">
    <span id="toast-message">Thông báo</span>
  </div>

  <h1>DỊCH VỤ DISCORD</h1>

  <div class="services-section">
    <!-- Dịch vụ 1 -->
    <div class="service-card" data-service-id="dc_setup_server" data-base-price="120000" onclick="toggleService(this, 'dc_setup_server', 'Set up Discord server')">
      <div class="service-info">
        <div class="custom-checkbox"></div>
        <div class="service-name">Set up Discord server</div>
      </div>
      <div class="service-price">120.000đ</div>
    </div>

    <!-- Dịch vụ 2 -->
    <div class="service-card" data-service-id="dc_setup_bot" data-base-price="60000" onclick="toggleService(this, 'dc_setup_bot', 'Set Up bot cơ bản')">
      <div class="service-info">
        <div class="custom-checkbox"></div>
        <div class="service-name">Set Up bot cơ bản</div>
      </div>
      <div class="service-price">60.000đ</div>
    </div>

    <!-- Dịch vụ 3: NITRO — bấm vào sẽ thả xuống bảng chọn thời hạn -->
    <div class="service-card nitro-card" id="nitro-card">
      <div class="nitro-header" onclick="toggleNitroDropdown()">
        <div class="service-info">
          <div class="service-name">💎 Discord Nitro</div>
        </div>
        <div style="display:flex; align-items:center;">
          <span style="color:#6d887d; font-size:13px;">Chọn thời hạn</span>
          <span class="nitro-chevron">▾</span>
        </div>
      </div>
      <div class="nitro-options" id="nitro-options">
        <div class="nitro-option" data-service-id="dc_nitro_1m" data-base-price="50000" onclick="toggleNitroOption(event, this, 'dc_nitro_1m', 'Nitro 1 tháng')">
          <div class="nitro-option-name"><div class="custom-checkbox"></div>Nitro 1 Tháng</div>
          <div class="nitro-option-price">50.000đ</div>
        </div>
        <div class="nitro-option" data-service-id="dc_nitro_3m" data-base-price="130000" onclick="toggleNitroOption(event, this, 'dc_nitro_3m', 'Nitro 3 tháng')">
          <div class="nitro-option-name"><div class="custom-checkbox"></div>Nitro 3 Tháng</div>
          <div class="nitro-option-price">130.000đ</div>
        </div>
        <div class="nitro-option" data-service-id="dc_nitro_6m" data-base-price="240000" onclick="toggleNitroOption(event, this, 'dc_nitro_6m', 'Nitro 6 tháng')">
          <div class="nitro-option-name"><div class="custom-checkbox"></div>Nitro 6 Tháng</div>
          <div class="nitro-option-price">240.000đ</div>
        </div>
        <div class="nitro-option" data-service-id="dc_nitro_1y" data-base-price="420000" onclick="toggleNitroOption(event, this, 'dc_nitro_1y', 'Nitro 1 năm')">
          <div class="nitro-option-name"><div class="custom-checkbox"></div>Nitro 1 Năm</div>
          <div class="nitro-option-price">420.000đ</div>
        </div>
      </div>
    </div>

    <!-- BẢNG TỔNG TIỀN -->
    <div class="total-box">
      <div class="total-title">Tổng tiền thanh toán:</div>
      <div class="total-amount" id="total-display">0đ</div>
    </div>
    <button class="pay-btn" id="pay-btn" disabled onclick="handlePayment()">THANH TOÁN</button>
  </div>

  <a href="index.html" class="back-btn">← Quay lại trang chính</a>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="shared.js"></script>
  <!-- ĐOẠN JS XỬ LÝ LOGIC TÍNH TIỀN & THANH TOÁN -->
  <script>
    let selectedItems = []; // {name, price, el}
    let nitroSelected = null; // {name, price, el}

    function resolvePrice(el) {
      const id = el.getAttribute('data-service-id');
      const base = parseInt(el.getAttribute('data-base-price'), 10) || 0;
      return getServicePrice(id, base);
    }

    function applyMaintenanceLocks() {
      document.querySelectorAll('.service-card[data-service-id]').forEach(card => {
        const id = card.getAttribute('data-service-id');
        const priceEl = card.querySelector('.service-price');
        if (!isServiceActive(id)) {
          card.classList.add('locked');
          if (priceEl && !priceEl.dataset.original) {
            priceEl.dataset.original = priceEl.innerText;
            priceEl.innerHTML = '<span class="maintenance-badge">BẢO TRÌ</span>';
          }
        } else {
          card.classList.remove('locked');
          if (priceEl && priceEl.dataset.original) {
            priceEl.innerText = priceEl.dataset.original;
          }
          if (priceEl) priceEl.innerText = resolvePrice(card).toLocaleString('vi-VN') + 'đ';
        }
      });

      document.querySelectorAll('.nitro-option[data-service-id]').forEach(opt => {
        const id = opt.getAttribute('data-service-id');
        const priceEl = opt.querySelector('.nitro-option-price');
        if (!isServiceActive(id)) {
          opt.classList.add('locked');
          if (priceEl && !priceEl.dataset.original) {
            priceEl.dataset.original = priceEl.innerText;
            priceEl.innerHTML = '<span class="maintenance-badge">BẢO TRÌ</span>';
          }
        } else {
          opt.classList.remove('locked');
          if (priceEl) priceEl.innerText = resolvePrice(opt).toLocaleString('vi-VN') + 'đ';
        }
      });
    }
    document.addEventListener('DOMContentLoaded', async () => {
      await window.sharedDataReady;
      applyMaintenanceLocks();
    });

    function toggleService(element, serviceId, serviceName) {
      if (!isServiceActive(serviceId)) {
        showToast("Dịch vụ này đang BẢO TRÌ, không thể chọn mua!", "#ff3333");
        return;
      }
      const price = resolvePrice(element);

      element.classList.toggle('selected');

      if (element.classList.contains('selected')) {
        selectedItems.push({ name: serviceName, price: price, el: element });
      } else {
        const idx = selectedItems.findIndex(s => s.el === element);
        if (idx > -1) selectedItems.splice(idx, 1);
      }

      updateTotal();
    }

    /* ============== NITRO: menu thả xuống + chọn 1 thời hạn duy nhất ============== */
    function toggleNitroDropdown() {
      document.getElementById('nitro-card').classList.toggle('open');
    }

    function toggleNitroOption(event, element, serviceId, serviceName) {
      event.stopPropagation();
      if (element.classList.contains('locked') || !isServiceActive(serviceId)) {
        showToast("Gói Nitro này đang BẢO TRÌ, không thể chọn mua!", "#ff3333");
        return;
      }
      const price = resolvePrice(element);

      // Nếu đang chọn lại đúng gói đã chọn -> bỏ chọn
      if (nitroSelected && nitroSelected.el === element) {
        element.classList.remove('selected');
        const idx = selectedItems.findIndex(s => s.el === element);
        if (idx > -1) selectedItems.splice(idx, 1);
        nitroSelected = null;
        updateTotal();
        return;
      }

      // Bỏ chọn gói Nitro cũ (nếu có) vì chỉ được chọn 1 thời hạn
      if (nitroSelected) {
        nitroSelected.el.classList.remove('selected');
        const idx = selectedItems.findIndex(s => s.el === nitroSelected.el);
        if (idx > -1) selectedItems.splice(idx, 1);
      }

      element.classList.add('selected');
      nitroSelected = { name: serviceName, price: price, el: element };
      selectedItems.push(nitroSelected);

      updateTotal();
    }

    function updateTotal() {
      const totalMoney = selectedItems.reduce((sum, s) => sum + s.price, 0);
      document.getElementById('total-display').innerText = totalMoney.toLocaleString('vi-VN') + 'đ';
      document.getElementById('pay-btn').disabled = totalMoney <= 0;
    }

    async function handlePayment() {
      const total = selectedItems.reduce((sum, s) => sum + s.price, 0);

      if (total <= 0) {
        showToast("Vui lòng chọn ít nhất 1 dịch vụ!", "#ff3333");
        return;
      }

      const currentUser = getCurrentUser();
      if (!currentUser) {
        showToast("Vui lòng đăng nhập trước khi thanh toán!", "#ff3333");
        return;
      }

      const blockedItem = selectedItems.find(s => s.el.classList.contains('locked'));
      if (blockedItem) {
        showToast("Có dịch vụ vừa chuyển sang Bảo Trì, vui lòng bỏ chọn và thử lại!", "#ff3333");
        return;
      }

      const linkedDiscord = await hasDiscordIdLinked();
      if (!linkedDiscord) {
        showToast(DISCORD_ID_REQUIRED_MSG, "#ff3333");
        return;
      }

      await fetchBalance();
      const balance = getBalance();
      if (balance < total) {
        showToast(`Số dư không đủ!\nCòn thiếu: ${formatVND(total - balance)}`, "#ff3333");
        return;
      }

      const payBtn = document.getElementById('pay-btn');
      payBtn.disabled = true;

      showToast("Giao Dịch Đang Xử Lý...", "#ffaa00");

      const itemNames = selectedItems.map(s => s.name).join(", ");
      const success = await purchaseService(itemNames, total);

      if (success === 'THIEU_DISCORD_ID') {
        showToast(DISCORD_ID_REQUIRED_MSG, "#ff3333");
        payBtn.disabled = false;
        return;
      }
      if (!success) {
        showToast("Thanh toán thất bại! Số dư không đủ hoặc có lỗi, vui lòng thử lại.", "#ff3333");
        payBtn.disabled = false;
        return;
      }

      showToast("Giao Dịch Thành Công ✅", "#00ff7f");

      selectedItems.forEach(s => s.el.classList.remove('selected'));
      selectedItems = [];
      nitroSelected = null;
      document.getElementById('total-display').innerText = '0đ';
      payBtn.disabled = true;
    }
  </script>

</body>
</html>
